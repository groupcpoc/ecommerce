spring:
  application:
    name: inventory-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: jdbc:h2:mem:inventorydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:}
    admin:
      fail-fast: false
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:false}
      missing-topics-fatal: false
    producer:
      acks: all
      retries: 3

server:
  port: ${SERVER_PORT:8088}

app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}
    create-topics: ${APP_KAFKA_CREATE_TOPICS:false}
    topics:
      payment-processed: payment.processed
      order-cancelled: order.cancelled
      inventory-reserved: inventory.reserved
      inventory-failed: inventory.failed
      inventory-released: inventory.released

keycloak:
  admin:
    username: ${KEYCLOAK_ADMIN:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin1234}
