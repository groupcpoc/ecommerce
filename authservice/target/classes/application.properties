server.port=8081
keycloak.url=http://localhost:8080
keycloak.realm=auth-service-realm
keycloak.client-id=authservice-client
keycloak.client-secret=authservice-client
keycloak.admin.username=admin
keycloak.admin.password=admin123
keycloak.use-resource-role-mappings=true
keycloak.bearer-only=true
keycloak.user.username-attribute=username
keycloak.user.email-attribute=email
keycloak.user.email-verification=enabled
keycloak.user.password-attribute=password
keycloak.logout-url=http://localhost:8080/realms/auth-service-realm/protocol/openid-connect/logout
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/auth-service-realm
#Zookeeper configuration
zookeeper.connect=localhost:2181
zookeeper.image=confluentinc/cp-zookeeper:7.5.0
container_name=zookeeper
environment=ZOOKEEPER_CLIENT_PORT: 2181
ZOOKEEPER_TICK_TIME=2000
ports=2181
# =========Kafka configuration=========
#spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.group-id=auth-service-Group
spring.kafka.producer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.main.allow-bean-definition-overriding=true
