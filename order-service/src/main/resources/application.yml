server:
  port: 8086

spring:
  application:
    name: order-service

  # ── Keycloak / OAuth2 Resource Server ──────────────────────────────────────
  # The service validates every incoming JWT against Keycloak's JWKS endpoint.
  # Update the issuer-uri to match your Keycloak host, realm, and port.
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak publishes its JWKS at:
          #   <issuer-uri>/protocol/openid-connect/certs
          # Spring will auto-discover it from the issuer metadata endpoint.
          issuer-uri: http://localhost:8080/realms/ecommerce
          jwk-set-uri: http://localhost:8080/realms/ecommerce/protocol/openid-connect/certs

  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        schema.registry.url: http://localhost:8081
    consumer:
      group-id: order-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      auto-offset-reset: earliest
      properties:
        specific.avro.reader: true
        schema.registry.url: http://localhost:8081

eureka:
  instance:
    prefer-ip-address: true
  client:
    registerWithEureka: true
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.kafka: INFO
